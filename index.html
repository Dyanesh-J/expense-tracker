<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Money Coach</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="global-loader" class="global-loader hidden">
    <div class="loader-content">
      <div class="loader-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">MMC</span>
      </div>
      <div class="loader-bar-wrap">
        <div class="loader-bar"></div>
      </div>
      <p class="loader-status">Initializing engine...</p>
    </div>
    <div class="loader-bg-grid"></div>
  </div>

  <!-- Page Transition Overlay -->
  <div id="page-transition" class="page-transition"></div>

  <!-- App Shell -->
  <div id="app" class="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-icon">◈</span>
          <div class="brand-text">
            <span class="brand-name">Money Coach</span>
            <span class="brand-sub">Monthly Tracker</span>
          </div>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle">
          <span></span><span></span><span></span>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">OVERVIEW</div>
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span class="nav-label">Dashboard</span>
          <div class="nav-indicator"></div>
        </a>

        <div class="nav-section-label">MANAGE</div>
        <a href="#expenses" class="nav-item" data-page="expenses">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span class="nav-label">Expenses</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#budget" class="nav-item" data-page="budget">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          <span class="nav-label">Budget</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#goals" class="nav-item" data-page="goals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.5 5.2 5.7.8-4.1 4 1 5.7L12 16l-5.1 2.7 1-5.7-4.1-4 5.7-.8L12 3z"/></svg>
          <span class="nav-label">Goals</span>
          <div class="nav-indicator"></div>
        </a>

        <div class="nav-section-label">INSIGHTS</div>
        <a href="#analytics" class="nav-item" data-page="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span class="nav-label">Analytics</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#reports" class="nav-item" data-page="reports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-label">Reports</span>
          <div class="nav-indicator"></div>
        </a>
        <a href="#history" class="nav-item" data-page="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18"/><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg>
          <span class="nav-label">History</span>
          <div class="nav-indicator"></div>
        </a>

        <div class="nav-section-label">SYSTEM</div>
        <a href="#settings" class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span class="nav-label">Settings</span>
          <div class="nav-indicator"></div>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="wasm-badge" id="wasm-badge">
          <span class="wasm-dot"></span>
          <span class="wasm-label">JS Mode</span>
        </div>
        <div class="current-month" id="sidebar-month"></div>
        <div class="sidebar-user hidden" id="sidebar-user">
          <div class="sidebar-user-name" id="sidebar-user-name"></div>
          <div class="sidebar-user-email" id="sidebar-user-email"></div>
          <button class="btn btn-secondary btn-sm sidebar-user-action" id="logout-btn">Sign Out</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main-content" class="main-content">
      <div id="page-container" class="page-container"></div>
    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
